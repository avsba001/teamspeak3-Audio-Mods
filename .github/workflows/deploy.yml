name: Build and Deploy

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

env:
  PLUGIN_NAME: JUL14Ns_Audio_Mods

jobs:
  prebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Variables
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="$(echo ${GITHUB_REF#refs/tags/v})"
          else
            VERSION="0.0.0-dev"
          fi
          sed -i "s/<version>/${VERSION}/g" deploy/package.ini
          sed -i "s/<version>/${VERSION}/g" src/definitions.hpp
          sed -i "s/<plugin_name>/${{ env.PLUGIN_NAME }}/g" CMakeLists.txt
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuild
          path: |
            deploy/package.ini
            src/definitions.hpp
            CMakeLists.txt

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            arch: x64
          - os: windows-2022
            arch: x86
          - os: ubuntu-latest
            arch: x64
    runs-on: ${{ matrix.os }}
    needs: prebuild
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Download prebuild
        uses: actions/download-artifact@v4
        with:
          name: prebuild
          path: .
      - name: Setup MSVC (Windows only)
        uses: ilammy/msvc-dev-cmd@v1
        if: startsWith(matrix.os, 'windows-')
        with:
          arch: ${{ matrix.arch }}
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        if: ${{ !startsWith(matrix.os, 'macos-') }}
        with:
          version: '5.15.2'
          target: 'desktop'
          modules: 'qtcharts'
          arch: ${{ startsWith(matrix.os, 'windows-') && (matrix.arch == 'x64' && 'win64_msvc2019_64' || 'win32_msvc2019' ) || (matrix.os == 'ubuntu-latest' && 'gcc_64' || 'clang_64') }}
          dir: '${{ github.workspace }}'
          cache: true
          cache-key-prefix: ${{ runner.os }}-${{ matrix.arch }}-Qt
      - name: Install Qt (macOS)
        if: ${{ startsWith(matrix.os, 'macos-') }}
        run: |
          brew install qt@5
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v1.14
      - name: Build
        shell: bash
        run: |
          cmake ${{startsWith(matrix.os, 'windows-') && '-A' || ''}} ${{startsWith(matrix.os, 'windows-') && (matrix.arch == 'x64' && 'x64' || 'Win32') || '' }} .
          cmake --build . --config Release
      - name: Rename release (Windows)
        if: startsWith(matrix.os, 'windows-')
        run: |
          mv Release/${{ env.PLUGIN_NAME }}.dll ${{ env.PLUGIN_NAME }}_win${{ matrix.arch == 'x64' && '64' || '32' }}.dll
      - name: Rename release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mv lib${{ env.PLUGIN_NAME }}.so ${{ env.PLUGIN_NAME }}_linux_amd64.so
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}${{ matrix.arch }}
          path: ${{ env.PLUGIN_NAME }}_[win|linux|mac]*.*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download prebuild
        uses: actions/download-artifact@v4
        with:
          name: prebuild
          path: .
      - name: Remove old artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          name: prebuild
      - name: Create Tmp Folder
        run: |
          mkdir -p tmp
      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: tmp
      - name: Move artifacts to release
        run: |
          mv tmp/**/* deploy/plugins/
      - name: Install zip
        uses: montudor/action-zip@v1
      - name: Zip output
        run: zip -qq -r ../${{ env.PLUGIN_NAME }}.zip .
        working-directory: deploy
      - name: Rename release
        run: |
          mv ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}.${{ github.ref_name }}.ts3_plugin
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./${{ env.PLUGIN_NAME }}.${{ github.ref_name }}.ts3_plugin
          draft: false
          prerelease: false
